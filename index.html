<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rihab &amp; Badiy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Alex+Brush&family=Jost:wght@300;400;500&display=swap');

        :root{
            --kraft-light: #cbb392;
            --kraft-dark: #a3875f;
            --kraft-shadow: #7c6440;
            --gold: #c9a05c;
            --gold-light: #e6cd97;
            --ink: #2e2a24;
            --stone: #6b6154;
            --cream: #faf6ee;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }

        html,body{
            height:100%;
            background: #1c1712;
            font-family: 'Jost', sans-serif;
            overflow:hidden;
        }

        .stage{
            position:relative;
            width:100vw;
            height:100vh;
            background: radial-gradient(ellipse at 50% 20%, #2b241c 0%, #14100c 70%);
            overflow:hidden;
        }

        /* soft ambient dust/light particles */
        .mote{
            position:absolute;
            width:3px; height:3px;
            background: var(--gold-light);
            border-radius:50%;
            opacity:0.35;
            animation: rise linear infinite;
            pointer-events:none;
            z-index:1;
        }
        @keyframes rise{
            0%{ transform: translateY(10vh); opacity:0; }
            15%{ opacity:0.5; }
            100%{ transform: translateY(-110vh); opacity:0; }
        }

        /* ===== FULL-PAGE KRAFT ENVELOPE ===== */
        .envelope{
            position:absolute;
            inset:0;
            cursor:pointer;
            z-index:5;
        }
        .envelope.opened{ cursor:default; pointer-events:none; }

        .envelope-body{
            position:absolute;
            inset:0;
            background:
                    repeating-linear-gradient(115deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 4px),
                    repeating-linear-gradient(25deg, rgba(0,0,0,0.03) 0px, transparent 2px, transparent 5px),
                    linear-gradient(150deg, var(--kraft-light) 0%, var(--kraft-dark) 55%, var(--kraft-shadow) 100%);
        }

        .envelope-body::after{
            content:'';
            position:absolute;
            inset:0;
            box-shadow: inset 0 0 140px rgba(0,0,0,0.35), inset 0 0 40px rgba(0,0,0,0.2);
        }

        /* envelope diagonal seams */
        .seam{
            position:absolute;
            inset:0;
            background:
                    linear-gradient(115deg, transparent 49.5%, rgba(0,0,0,0.12) 50%, transparent 50.5%),
                    linear-gradient(245deg, transparent 49.5%, rgba(0,0,0,0.12) 50%, transparent 50.5%),
                    linear-gradient(to top, rgba(0,0,0,0.1), transparent 30%);
            z-index:1;
            transition: opacity 0.6s ease;
        }
        .envelope.opened .seam{ opacity:0; }

        .flap{
            position:absolute;
            top:0; left:0; width:100%; height:58%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            background:
                    repeating-linear-gradient(115deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 4px),
                    linear-gradient(165deg, var(--kraft-light) 0%, var(--kraft-dark) 60%, var(--kraft-shadow) 100%);
            transform-origin: top center;
            transition: transform 1.1s cubic-bezier(.6,.05,.28,1), opacity 0.6s ease 0.6s;
            z-index:4;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }
        .envelope.opened .flap{
            transform: rotateX(180deg);
            opacity:0;
        }

        /* wax seal with rings */
        .seal{
            position:absolute;
            top:31%; left:50%;
            transform: translate(-50%,-50%);
            width:min(92px, 16vw); height:min(92px, 16vw);
            border-radius:50%;
            z-index:6;
            transition: opacity 0.45s ease, transform 0.45s ease;
            background:
                    radial-gradient(circle at 32% 28%, #dcb06a 0%, var(--gold) 45%, #9c7838 100%);
            box-shadow: 0 8px 18px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(255,255,255,0.12);
            display:flex; align-items:center; justify-content:center;
        }
        .seal svg{
            width:46%; height:46%;
            opacity:0.9;
        }
        .envelope.opened .seal{
            opacity:0;
            transform: translate(-50%,-50%) scale(0.3);
        }

        .monogram-label{
            position:absolute;
            top:50%; left:50%;
            transform: translate(-50%, -84%);
            text-align:center;
            z-index:3;
            transition: opacity 0.5s ease;
        }
        .monogram-label .initials-line{
            font-family:'Alex Brush', cursive;
            font-size:clamp(28px, 6vw, 40px);
            color: #fdf9f0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .envelope.opened .monogram-label{ opacity:0; }

        /* ===== CARD (photo invitation) ===== */
        .card{
            position:absolute;
            left:50%; top:50%;
            transform: translate(-50%, -46%) scale(0.9);
            width:min(400px, 88vw);
            height:min(640px, 82vh);
            border-radius:18px;
            overflow:hidden;
            box-shadow: 0 30px 90px rgba(0,0,0,0.6);
            opacity:0;
            z-index:3;
            transition: transform 1s cubic-bezier(.2,.8,.2,1) 0.5s, opacity 0.9s ease 0.5s;
        }
        .envelope.opened .card{
            transform: translate(-50%, -50%) scale(1);
            opacity:1;
            z-index:10;
            pointer-events:auto;
        }

        .card-photo{
            position:absolute;
            inset:0;
            background: linear-gradient(160deg, #c9b8a0, #8f7c66);
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .card-photo img{
            width:100%; height:100%; object-fit:cover; display:block;
        }
        .photo-placeholder{
            color: #fdf9f0;
            font-family:'Cormorant Garamond', serif;
            font-style:italic;
            font-size:15px;
            text-align:center;
            padding: 0 30px;
            opacity:0.85;
        }

        .card-overlay{
            position:absolute;
            left:0; right:0; bottom:0;
            padding: 60px 26px 34px;
            text-align:center;
            background: linear-gradient(to top, rgba(20,15,10,0.75) 0%, rgba(20,15,10,0.45) 45%, transparent 100%);
            color: #fdf9f0;
        }

        .our-wedding{
            font-family:'Alex Brush', cursive;
            font-size:clamp(38px, 9vw, 50px);
            color: #fdf9f0;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.35);
        }

        .eyebrow{
            font-size:10px;
            letter-spacing:0.28em;
            text-transform:uppercase;
            color: #e9dfce;
            margin-bottom:10px;
            opacity:0.9;
        }

        .names{
            font-family:'Cormorant Garamond', serif;
            font-weight:500;
            font-size:clamp(22px, 5.5vw, 28px);
            letter-spacing:0.03em;
            margin-bottom:14px;
        }

        .details{
            font-family:'Cormorant Garamond', serif;
            font-size:14px;
            letter-spacing:0.04em;
            line-height:1.9;
            color:#f1e9db;
            padding-top:12px;
            border-top: 1px solid rgba(233,223,206,0.35);
            display:inline-block;
        }
        .details .date-line{
            font-size:16px;
            color:#fdf9f0;
        }

        .close-btn{
            position:absolute;
            top:14px; right:16px;
            background: rgba(0,0,0,0.35);
            border:none;
            color: #fdf9f0;
            width:28px; height:28px;
            border-radius:50%;
            font-size:18px;
            cursor:pointer;
            z-index:11;
        }
        .close-btn:hover{ background: rgba(0,0,0,0.55); }

        @media (prefers-reduced-motion: reduce){
            .flap, .card, .seal, .mote{ transition:none; animation:none; }
        }
    </style>
</head>
<body>

<div class="stage" id="stage">

    <div class="envelope" id="envelope">
        <div class="envelope-body"></div>
        <div class="seam"></div>
        <div class="monogram-label">
            <div class="initials-line">Rihab &amp; Badiy</div>
        </div>
        <div class="flap"></div>
        <div class="seal">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="9" cy="14" r="6" stroke="#2e2010" stroke-width="1.4"/>
                <circle cx="15" cy="10" r="6" stroke="#2e2010" stroke-width="1.4"/>
            </svg>
        </div>

        <div class="card" id="card">
            <button class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
            <div class="card-photo">
               <img src="photo.jpg" alt="Rihab and Badiy">
            </div>
            <div class="card-overlay">
                <div class="our-wedding">our Wedding</div>
                <div class="eyebrow">Together with their families</div>
                <div class="names">Rihab &amp; Badiy</div>
                <div class="details">
                    <div class="date-line">Saturday, October 10, 2026</div>
                    <div>9:00 PM</div>
                    <div>Massaya 'Massarat' Space</div>
                    <div>Afrane Road, Km 10, Sfax 3093, Tunisia</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const stage = document.getElementById('stage');
    const envelope = document.getElementById('envelope');
    const closeBtn = document.getElementById('closeBtn');

    for(let i=0;i<30;i++){
        const m = document.createElement('div');
        m.className = 'mote';
        m.style.left = Math.random()*100 + 'vw';
        m.style.animationDuration = (6 + Math.random()*8) + 's';
        m.style.animationDelay = (Math.random()*8) + 's';
        stage.appendChild(m);
    }

    envelope.addEventListener('click', ()=>{
        if(envelope.classList.contains('opened')) return;
        envelope.classList.add('opened');
    });

    closeBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        envelope.classList.remove('opened');
    });
</script>

</body>
</html>
