<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rihab &amp; Badiy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Alex+Brush&family=Jost:wght@300;400;500;700&display=swap');

        :root{
            --kraft-light: #cbb392;
            --kraft-dark: #a3875f;
            --kraft-shadow: #7c6440;
            --gold: #c9a05c;
            --gold-light: #e6cd97;
            --ink: #2e2a24;
            --stone: #6b6154;
            --cream: #faf6ee;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }

        html,body{
            height:100%;
            background: #1c1712;
            font-family: 'Jost', sans-serif;
            overflow:hidden;
        }

        .stage{
            position:relative;
            width:100vw;
            height:100vh;
            background: radial-gradient(ellipse at 50% 20%, #2b241c 0%, #14100c 70%);
            overflow:hidden;
        }

        /* soft ambient dust/light particles */
        .mote{
            position:absolute;
            width:3px; height:3px;
            background: var(--gold-light);
            border-radius:50%;
            opacity:0.35;
            animation: rise linear infinite;
            pointer-events:none;
            z-index:1;
        }
        @keyframes rise{
            0%{ transform: translateY(10vh); opacity:0; }
            15%{ opacity:0.5; }
            100%{ transform: translateY(-110vh); opacity:0; }
        }

        /* ===== FULL-PAGE KRAFT ENVELOPE ===== */
        .envelope{
            position:absolute;
            inset:0;
            cursor:pointer;
            z-index:5;
        }
        .envelope.opened{ cursor:default; pointer-events:none; }

        .envelope-body{
            position:absolute;
            inset:0;
            background:
                    repeating-linear-gradient(115deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 4px),
                    repeating-linear-gradient(25deg, rgba(0,0,0,0.03) 0px, transparent 2px, transparent 5px),
                    linear-gradient(150deg, var(--kraft-light) 0%, var(--kraft-dark) 55%, var(--kraft-shadow) 100%);
        }

        .envelope-body::after{
            content:'';
            position:absolute;
            inset:0;
            box-shadow: inset 0 0 140px rgba(0,0,0,0.35), inset 0 0 40px rgba(0,0,0,0.2);
        }

        /* envelope diagonal seams */
        .seam{
            position:absolute;
            inset:0;
            background:
                    linear-gradient(115deg, transparent 49.5%, rgba(0,0,0,0.12) 50%, transparent 50.5%),
                    linear-gradient(245deg, transparent 49.5%, rgba(0,0,0,0.12) 50%, transparent 50.5%),
                    linear-gradient(to top, rgba(0,0,0,0.1), transparent 30%);
            z-index:1;
            transition: opacity 0.6s ease;
        }
        .envelope.opened .seam{ opacity:0; }

        .flap{
            position:absolute;
            top:0; left:0; width:100%; height:58%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            background:
                    repeating-linear-gradient(115deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 4px),
                    linear-gradient(165deg, var(--kraft-light) 0%, var(--kraft-dark) 60%, var(--kraft-shadow) 100%);
            transform-origin: top center;
            transition: transform 1.1s cubic-bezier(.6,.05,.28,1), opacity 0.6s ease 0.6s;
            z-index:4;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }
        .envelope.opened .flap{
            transform: rotateX(180deg);
            opacity:0;
        }

        /* wax seal with rings */
        .seal{
            position:absolute;
            top:31%; left:50%;
            transform: translate(-50%,-50%);
            width:min(92px, 16vw); height:min(92px, 16vw);
            border-radius:50%;
            z-index:6;
            transition: opacity 0.45s ease, transform 0.45s ease;
            background:
                    radial-gradient(circle at 32% 28%, #dcb06a 0%, var(--gold) 45%, #9c7838 100%);
            box-shadow: 0 8px 18px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(255,255,255,0.12);
            display:flex; align-items:center; justify-content:center;
        }
        .seal svg{
            width:46%; height:46%;
            opacity:0.9;
        }
        .envelope.opened .seal{
            opacity:0;
            transform: translate(-50%,-50%) scale(0.3);
        }

        .monogram-label .initials-line{
            font-family:'Alex Brush', cursive;
            font-size:clamp(28px, 6vw, 40px);
            color: #fdf9f0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .envelope.opened .monogram-label{ opacity:0; }

        /* ===== CARD (photo invitation) ===== */
        .card{
            position:absolute;
            left:50%; top:50%;
            transform: translate(-50%, -46%) scale(0.9);
            width:min(360px, 86vw);
            height:min(680px, 88vh);
            border-radius:18px;
            overflow:hidden;
            box-shadow: 0 30px 90px rgba(0,0,0,0.6);
            opacity:0;
            z-index:3;
            transition: transform 1s cubic-bezier(.2,.8,.2,1) 0.5s, opacity 0.9s ease 0.5s;
        }
        .envelope.opened .card{
            transform: translate(-50%, -50%) scale(1);
            opacity:1;
            z-index:10;
            pointer-events:auto;
        }

        .card-photo{
            position:absolute;
            inset:0;
            background: linear-gradient(160deg, #999 0%, #555 100%);
            filter: grayscale(1) contrast(1.05);
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .card-photo img{
            width:100%; height:100%; object-fit:cover; display:block;
        }
        .photo-placeholder{
            color: #fdf9f0;
            font-family:'Cormorant Garamond', serif;
            font-style:italic;
            font-size:14px;
            text-align:center;
            padding: 0 30px;
            opacity:0.85;
        }

        .card-overlay{
            position:absolute;
            inset:0;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding: 18px 20px;
            background:
                    linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 16%, rgba(0,0,0,0.05) 60%, rgba(0,0,0,0.6) 100%);
            color: #fdf9f0;
        }

        .save-date{
            font-family:'Jost', sans-serif;
            font-weight:400;
            font-size:clamp(30px, 8.5vw, 42px);
            letter-spacing:0.1em;
            line-height:1.05;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .the-wrap{
            position:relative;
            width:min(320px, 78vw);
            height:clamp(60px, 14vw, 80px);
            display:flex;
            align-items:center;
            justify-content:center;
            margin: 4px 0;
        }
        .the-wrap svg{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            overflow:visible;
        }
        .the-wrap svg path{
            fill:none;
            stroke:#f4efe4;
            stroke-width:1.4;
            stroke-linecap:round;
            opacity:0.9;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.35));
        }
        .the-script{
            position:relative;
            font-family:'Alex Brush', cursive;
            font-size:clamp(30px, 9vw, 44px);
            color:#f4efe4;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            z-index:1;
        }

        .date-row{
            margin-top:22px;
            font-family:'Jost', sans-serif;
            font-weight:400;
            font-size:clamp(14px, 3.2vw, 17px);
            letter-spacing:0.32em;
            display:flex;
            gap:12px;
            align-items:center;
        }
        .date-row .sep{
            opacity:0.6;
            font-weight:300;
        }

        .wedding-of{
            margin-top:18px;
            font-family:'Jost', sans-serif;
            font-weight:400;
            font-size:clamp(12px, 2.8vw, 14px);
            letter-spacing:0.2em;
        }
        .names-line{
            font-family:'Jost', sans-serif;
            font-weight:500;
            font-size:clamp(16px, 4vw, 19px);
            letter-spacing:0.14em;
            margin-top:4px;
        }

        .venue-script{
            margin-top:22px;
            font-family:'Alex Brush';
            font-size:clamp(19px, 4.6vw, 23px);
            line-height:1.5;
            color:#f4efe4;
        }

        .close-btn{
            position:absolute;
            top:14px; right:16px;
            background: rgba(0,0,0,0.35);
            border:none;
            color: #fdf9f0;
            width:28px; height:28px;
            border-radius:50%;
            font-size:18px;
            cursor:pointer;
            z-index:11;
        }
        .close-btn:hover{ background: rgba(0,0,0,0.55); }

        @media (prefers-reduced-motion: reduce){
            .flap, .card, .seal, .mote{ transition:none; animation:none; }
        }
    </style>
</head>
<body>

<div class="stage" id="stage">

    <div class="envelope" id="envelope">
        <div class="envelope-body"></div>
        <div class="seam"></div>
        <div class="flap"></div>
        <div class="seal">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="9" cy="14" r="6" stroke="#2e2010" stroke-width="1.4"/>
                <circle cx="15" cy="10" r="6" stroke="#2e2010" stroke-width="1.4"/>
            </svg>
        </div>

        <div class="card" id="card">
            <button class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
            <div class="card-photo">
                <img src="photo.jpg" alt="Rihab and Badiy"> -->
            </div>
            <div class="card-overlay">
                <div class="save-date">SAVE</div>
                <div class="the-wrap">
                    <svg viewBox="0 0 320 80" preserveAspectRatio="none">
                        <path d="M0,44 C40,20 70,52 100,34 C118,23 128,30 132,38"/>
                        <path d="M188,42 C192,50 202,57 220,46 C250,28 280,58 320,36"/>
                    </svg>
                    <div class="the-script">the</div>
                </div>
                <div class="save-date">DATE</div>
                <div class="date-row">
                    <span>10</span><span class="sep">|</span><span>10</span><span class="sep">|</span><span>2026</span>
                </div>
                <div class="wedding-of">Wedding of</div>
                <div class="names-line">Rihab &amp; Badiy</div>
                <div class="venue-script">
                    Espace Massaya "Massarat" at 9 pm<br>
                    Afrane Road, Km 10, Sfax 3093, Tunisia
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
    const stage = document.getElementById('stage');
    const envelope = document.getElementById('envelope');
    const closeBtn = document.getElementById('closeBtn');
    const bgMusic = document.getElementById("bgMusic");

    // ===== Floating particles (dust effect) =====
    for (let i = 0; i < 30; i++) {
        const mote = document.createElement('div');
        mote.className = 'mote';

        mote.style.left = Math.random() * 100 + 'vw';
        mote.style.animationDuration = (6 + Math.random() * 8) + 's';
        mote.style.animationDelay = (Math.random() * 8) + 's';

        stage.appendChild(mote);
    }

    // ===== Open envelope + start music =====
    envelope.addEventListener('click', async () => {

        if (envelope.classList.contains('opened')) return;

        envelope.classList.add('opened');

        // start music with fade-in
        bgMusic.volume = 0;

        try {
            await bgMusic.play();
        } catch (err) {
            console.log("Music blocked by browser:", err);
            return;
        }

        let volume = 0;

        const fadeIn = setInterval(() => {
            volume += 0.02;

            if (volume >= 0.4) {
                volume = 0.4;
                clearInterval(fadeIn);
            }

            bgMusic.volume = volume;
        }, 120);
    });

    // ===== Close button (reset invitation) =====
    closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();

        envelope.classList.remove('opened');

        // stop music and reset
        bgMusic.pause();
        bgMusic.currentTime = 0;
    });
</script>

</body>
</html>
